name: Build IPK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }} IPKs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - i386_geode
          - i386_pentium
          - i386_pentium4
          - x86_64
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - arm_arm926ej-s
          - arm_arm1176jzf-s_vfp
          - arm_xscale
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a53_neon-vfpv4
          - mips_4kec
          - mips_24kc
          - mipsel_4kec
          - mipsel_24kc
          - mipsel_74kc
          - mips64_octeonplus
          - mips64el_mips64r2
          - riscv64_riscv64
          - loongarch64_generic

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/qsh-telecom-autologin/src/go.mod
          cache-dependency-path: |
            packages/qsh-telecom-autologin/src/go.sum
            packages/go-nd-portal/src/go.sum

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y tar gzip

      - name: Build IPKs
        env:
          IPK_ARCH: ${{ matrix.arch }}
          SOURCE_DATE_EPOCH: 1764608399
        run: bash scripts/build-ipk.sh

      - name: Upload IPKs
        uses: actions/upload-artifact@v6
        with:
          name: uestc-authclient-${{ matrix.arch }}-ipk
          path: |
            dist/*.ipk
            dist/SHA256SUMS

  release:
    name: Publish latest release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download IPK artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --dir release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find release-artifacts -type f -name '*.ipk' -exec cp -f {} release/ \;
          (cd release && sha256sum *.ipk > SHA256SUMS)
          cat > release/RELEASE_NOTES.md <<EOF
          ## 发布说明

          这是由 CI 自动生成的滚动发布，来源提交：

          \`\`\`text
          ${GITHUB_SHA}
          \`\`\`

          \`latest\` 会在每次 \`main\` 分支 CI 成功后被替换。固定追溯构建来源时，请以提交哈希、Actions 运行记录和 \`SHA256SUMS\` 为准。

          ## 包说明

          | 包名 | 作用 | 适用对象 |
          | --- | --- | --- |
          | \`qsh-telecom-autologin_<version>_<arch>.ipk\` | 电信认证命令行客户端，支持旧版电信 portal 和新版电信锐捷 / CAS portal。 | 使用 \`电信锐捷认证 (qsh-telecom-ruijie)\` 或旧版 \`CT authentication method\` 的用户。必须选择与路由器一致的 \`<arch>\`。 |
          | \`go-nd-portal_<version>_<arch>.ipk\` | Srun 认证命令行客户端。 | 使用 \`Srun authentication method\` 的用户。必须选择与路由器一致的 \`<arch>\`。 |
          | \`luci-app-uestc-authclient_<version>_all.ipk\` | LuCI 管理界面、认证调度脚本、网络监控脚本和默认 UCI 配置。 | 所有需要在 LuCI 中管理认证会话的用户。\`all\` 表示不区分 CPU 架构。 |
          | \`luci-i18n-uestc-authclient-zh-cn_<version>_all.ipk\` | LuCI 简体中文语言包。 | 需要中文界面的用户。\`all\` 表示不区分 CPU 架构。 |
          | \`SHA256SUMS\` | Release 中所有 IPK 文件的 SHA256 校验值。 | 下载后校验文件完整性。 |

          ## 推荐安装组合

          常规安装建议下载并安装四个包：

          \`\`\`sh
          opkg install qsh-telecom-autologin_*_<arch>.ipk
          opkg install go-nd-portal_*_<arch>.ipk
          opkg install luci-app-uestc-authclient_*_all.ipk
          opkg install luci-i18n-uestc-authclient-zh-cn_*_all.ipk
          \`\`\`

          其中 \`<arch>\` 通过路由器上的以下命令确认：

          \`\`\`sh
          opkg print-architecture
          \`\`\`

          ## 兼容性说明

          Release 中的 IPK 面向 opkg/IPK 系 OpenWrt 固件。CI 会覆盖多个常见 OpenWrt 架构，Go 客户端以静态方式交叉编译；\`all\` 包不区分 CPU 架构，但仍需要固件提供 LuCI、rpcd、uci 和 procd 环境。使用 apk 包管理的 OpenWrt 分支需要单独打包。

          EOF
          ls -lh release

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
          short_sha="${GITHUB_SHA::7}"
          gh release create latest release/*.ipk release/SHA256SUMS \
            --title "Latest build (${short_sha})" \
            --notes-file release/RELEASE_NOTES.md \
            --latest
