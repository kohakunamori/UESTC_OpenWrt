name: Build IPK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }} IPKs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - arm_arm1176jzf-s_vfp
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9
          - arm_cortex-a15_neon-vfpv4
          - mips_24kc
          - mipsel_24kc
          - mipsel_74kc
          - riscv64_riscv64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/qsh-telecom-autologin/src/go.mod
          cache-dependency-path: |
            packages/qsh-telecom-autologin/src/go.sum
            packages/go-nd-portal/src/go.sum

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y tar gzip

      - name: Build IPKs
        env:
          IPK_ARCH: ${{ matrix.arch }}
          SOURCE_DATE_EPOCH: 1764608399
        run: bash scripts/build-ipk.sh

      - name: Upload IPKs
        uses: actions/upload-artifact@v6
        with:
          name: uestc-authclient-${{ matrix.arch }}-ipk
          path: |
            dist/*.ipk
            dist/SHA256SUMS

  release:
    name: Publish latest release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download IPK artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --dir release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find release-artifacts -type f -name '*.ipk' -exec cp -f {} release/ \;
          (cd release && sha256sum *.ipk > SHA256SUMS)
          ls -lh release

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
          short_sha="${GITHUB_SHA::7}"
          gh release create latest release/* \
            --title "Latest build (${short_sha})" \
            --notes "Automated IPK build for commit ${GITHUB_SHA}. This rolling release is replaced on every push to main." \
            --latest
